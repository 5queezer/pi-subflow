# yaml-language-server: $schema=https://raw.githubusercontent.com/5queezer/pi-subflow/refs/heads/master/schemas/subflow-dag.schema.json
# Copy this whole file into the subflow tool's dagYaml parameter.
# Rename agents to match your local Pi agent definitions.
context-scout:
  agent: planner
  model: openai-codex/gpt-5.4-mini
  task: |
    Read the user's implementation request and inspect nearby project context.
    Identify the smallest vertical slice, relevant files, existing tests, and
    verification commands. Do not modify code.
  tools: [read, bash]
  thinking: low

red-test:
  agent: coder
  model: openai-codex/gpt-5.3-codex-spark
  needs: [context-scout]
  task: |
    Write or update the most focused failing test for the requested behavior.
    Run only the targeted test command needed to prove the red state. Do not
    implement the production fix yet. Report the exact failing command and
    failure signal.
  tools: [read, edit, write, bash]
  thinking: low

green-implementation:
  agent: coder
  model: openai-codex/gpt-5.3-codex-spark
  needs: [red-test]
  task: |
    Implement the smallest production change that makes the red test pass.
    Keep the change narrow, preserve existing behavior, and run the targeted
    test command from the red step until it passes.
  tools: [read, edit, write, bash]
  thinking: medium

refactor-check:
  agent: reviewer
  model: openai-codex/gpt-5.4-mini
  needs: [green-implementation]
  task: |
    Review the implemented slice for refactoring opportunities, test quality,
    maintainability, documentation drift, and unnecessary scope. Apply only
    safe mechanical cleanups if clearly beneficial, then rerun the targeted
    verification command.
  tools: [read, edit, bash]
  thinking: low

tdd-verdict:
  agent: reviewer
  model: openai-codex/gpt-5.5
  role: verifier
  needs: [context-scout, red-test, green-implementation, refactor-check]
  task: |
    Verify the red-green-refactor story from the dependency outputs. Confirm
    that a focused test failed before implementation, passed after the minimal
    fix, and any refactor preserved green tests. Include remaining follow-up
    work without expanding the scope.

    Use exactly these markdown headings:
    ## Red test
    ## Green fix
    ## Refactor
    ## Verification
    ## Follow-ups
  tools: [read, bash]
  thinking: medium
  expectedSections: [Red test, Green fix, Refactor, Verification, Follow-ups]
