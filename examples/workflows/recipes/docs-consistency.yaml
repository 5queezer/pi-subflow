# yaml-language-server: $schema=https://raw.githubusercontent.com/5queezer/pi-subflow/refs/heads/master/schemas/subflow-dag.schema.json
# Copy this whole file into the subflow tool's dagYaml parameter.
# Rename agents to match your local Pi agent definitions.
readme-review:
  agent: reviewer
  model: openai-codex/gpt-5.4-mini
  task: |
    Review README.md for the requested behavior or API. Check whether examples,
    feature lists, troubleshooting, and installation/usage instructions are current.
  tools: [read]
  thinking: low

adr-review:
  agent: reviewer
  model: openai-codex/gpt-5.4-mini
  task: |
    Review doc/adr for decisions that should match the requested behavior or API.
    Flag contradictions, missing rationale, or stale architecture notes.
  tools: [read, bash]
  thinking: low

wiki-schema-review:
  agent: reviewer
  model: openai-codex/gpt-5.4-mini
  task: |
    Review doc/wiki, schemas, examples, and src/extension.ts for consistency with
    README.md and doc/adr guidance. Flag stale schema fields, outdated examples,
    or LLM-facing guidance drift.
  tools: [read, bash]
  thinking: low

prompt-guidance-review:
  agent: reviewer
  model: openai-codex/gpt-5.4-mini
  task: |
    Review LLM-facing guidance such as promptSnippet, promptGuidelines, schemas,
    examples, and src/extension.ts. Check whether assistants will know how to use
    the behavior safely.
  tools: [read, bash]
  thinking: low

consistency-verdict:
  agent: reviewer
  model: openai-codex/gpt-5.4-mini
  role: verifier
  needs: [readme-review, adr-review, wiki-schema-review, prompt-guidance-review]
  task: |
    Synthesize documentation consistency findings. Name every file that should change.
    Use exactly these markdown headings:
    ## Summary
    ## Findings
    ## Recommendation
  tools: [read]
  thinking: medium
  expectedSections: [Summary, Findings, Recommendation]
